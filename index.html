<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Objetos JavaScript</h1>

    <script>
        const pessoa = { 
            nome:"João",
            idade:30 ,
            saudacao: function() {
                console.log("Olá, meu nome é " + this.name)
            }
        };
        
        pessoa.saudacao(); // Chama o metodo saudacao do objeto pessoa

        const carro = { 
            marca:"Fiat",
            modelo:"Barchetta",
            Ano:"1998" ,
            
            descricao: function() {
                console.log("Seu Carro é " + this.name)
            }
        };

        carro.descricao(); 

        const livro = { 
            titulo:"Diario de um banana",
            autor:"Jeff Kinney",
            publicacao:2007,

            detalhe: function() {
                console.log("Seu livro é " + this.name)
            }
        };

        livro.detalhe(); 

        const filme = { 
            titulo:"O Poderoso Chefão",
            diretor:"Francis Ford Coppola",
            lancamento:1972,

            informacao: function() {
                console.log("Seu filme é " + this.name)
            }
        };

        filme.informacao(); 

        const computador = { 
            marca:"Dell",
            modelo:"XPS 13",
            anoFabricacao:2020 ,

            especificacao: function() {
                console.log("Seu computador é " + this.name)
            }
        };

        computador.especificacao(); 
    
        const celular = { 
            marca:"Apple",
            modelo:"iPhone 12",
            lancamento:2020 ,

            detalhes: function() {
                console.log("Seu celular é " + this.name)
            }
        };  

        celular.detalhes(); 
    </script>
</body>
</html>
